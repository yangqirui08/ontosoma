name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test
      - name: ontology drift gate (zero-drift)
        run: npm run onto:check
